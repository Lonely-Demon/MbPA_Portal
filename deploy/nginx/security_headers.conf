# Baseline security headers, shared by every location that needs them.
#
# Copy this file to the path referenced by nginx.conf's `include` directives
# (e.g. /etc/nginx/security_headers.conf in the container), alongside
# admin_allowlist.conf.
#
# nginx only inherits a location's add_header set from its parent when that
# location declares none of its own — so any location that needs its own
# add_header (CSP for the SPA/static routes, Cache-Control for /static/) must
# `include` this file itself rather than relying on inheritance. See
# nginx.conf for where this is included.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options DENY always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# HSTS at the edge. This server listens on :80 and is expected to sit behind a
# TLS-terminating load balancer / CDN (Django trusts X-Forwarded-Proto via
# SECURE_PROXY_SSL_HEADER). If you instead terminate TLS in nginx, add a 443
# server block plus an HTTP→HTTPS redirect.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
