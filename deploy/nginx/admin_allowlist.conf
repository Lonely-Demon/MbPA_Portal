# HIGH-6: Django admin IP allowlist.
#
# Copy this file to the path referenced by nginx.conf's `include` directive
# for /admin/ (e.g. /etc/nginx/admin_allowlist.conf in the container) and
# uncomment/add `allow` lines for your office network(s) and VPN egress
# range(s) before going live. Everything else is denied by the `deny all;`
# that follows the include in nginx.conf.
#
# Example:
#   allow 203.0.113.0/24;    # MbPA office network
#   allow 198.51.100.7/32;   # Admin VPN egress IP
#
allow 127.0.0.1;
allow ::1;
