# HIGH-5: L7 rate limiting ahead of Django/gunicorn. DRF's ScopedRateThrottle
# only covers a few auth endpoints, and its counters are per-process (in-memory
# cache) so they don't hold up across multiple gunicorn workers/replicas — this
# zone lives in shared memory in nginx itself and is the layer that actually
# survives a flood before it reaches the app. Keyed by IP, 10 MB zone (~160k
# tracked IPs) is ample for this deployment's expected traffic.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    # ── Static assets (Vite build output) ────────────────────────────────────
    root /app/frontend/dist;
    index index.html;

    # All non-API paths → SPA index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Django API + admin ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        # HIGH-6: restrict the Django admin to a trusted network allowlist.
        # admin_allowlist.conf ships allowing only loopback (see
        # deploy/nginx/admin_allowlist.conf) — an operator must add real
        # office/VPN CIDRs there before anyone off-box can reach /admin/, so
        # this fails closed rather than open.
        include /etc/nginx/admin_allowlist.conf;
        deny all;

        limit_req zone=admin_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/backend/staticfiles/;
        expires 1y;
        # This block declares its own add_header, which DISABLES inheritance of
        # the server-level security headers below — so they must be repeated here.
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: nginx inherits these into child location {} blocks ONLY while those
    # blocks declare no add_header of their own (see /static/ above, which had to
    # repeat them). If you add an add_header to /api/ or /admin/, you MUST repeat
    # all of these there too or they silently drop for that location.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS at the edge. This server listens on :80 and is expected to sit behind a
    # TLS-terminating load balancer / CDN (Django trusts X-Forwarded-Proto via
    # SECURE_PROXY_SSL_HEADER). If you instead terminate TLS in nginx, add a 443
    # server block plus an HTTP→HTTPS redirect here.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 25M;
}
