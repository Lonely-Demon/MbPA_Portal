# HIGH-5: L7 rate limiting ahead of Django/gunicorn. DRF's ScopedRateThrottle
# only covers a few auth endpoints, and its counters are per-process (in-memory
# cache) so they don't hold up across multiple gunicorn workers/replicas — this
# zone lives in shared memory in nginx itself and is the layer that actually
# survives a flood before it reaches the app. Keyed by IP, 10 MB zone (~160k
# tracked IPs) is ample for this deployment's expected traffic.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    # ── Static assets (Vite build output) ────────────────────────────────────
    root /app/frontend/dist;
    index index.html;

    # All non-API paths → SPA index.html
    #
    # M-5: CSP for the SPA shell. django-csp (config/settings/base.py) already
    # sets this header, with this same policy, on Django-served responses
    # (/api/, /admin/) — it is declared here rather than at server level so it
    # is NOT also sent on those proxied responses (which would just be a
    # redundant duplicate, since /api/ and /admin/ have no add_header of their
    # own and already inherit the shared headers below via the server-level
    # include).
    location / {
        include /etc/nginx/security_headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Django API + admin ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        # HIGH-6: restrict the Django admin to a trusted network allowlist.
        # admin_allowlist.conf ships allowing only loopback (see
        # deploy/nginx/admin_allowlist.conf) — an operator must add real
        # office/VPN CIDRs there before anyone off-box can reach /admin/, so
        # this fails closed rather than open.
        include /etc/nginx/admin_allowlist.conf;
        deny all;

        limit_req zone=admin_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/backend/staticfiles/;
        expires 1y;
        # This block declares its own add_header, which DISABLES inheritance of
        # the server-level security headers below — so they must be repeated
        # here (via the same shared include used by / above).
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: nginx inherits these into child location {} blocks ONLY while those
    # blocks declare no add_header of their own (see / and /static/ above,
    # which both `include` this same file for that reason). If you add an
    # add_header to /api/ or /admin/, you MUST include it there too or the
    # headers will silently drop for that location.
    include /etc/nginx/security_headers.conf;

    client_max_body_size 25M;
}
