[tool.ruff]
src = ["backend"]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "RUF"]
ignore = [
    "S101",   # assert — used in tests
    "S105",   # hardcoded password in test fixtures
    "N805",   # first arg of method should be self — conflicts with DRF APIView patterns
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501", "N806", "RUF012"]
"*/tests/*" = ["S", "B"]
"*/management/commands/*" = ["S"]

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
strict = false
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "config.settings.local"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.local"
python_files = ["tests.py", "test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
skips = ["B101", "B601"]

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/tests/*", "*/management/*"]
